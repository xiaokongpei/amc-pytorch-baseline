experiment_name: harper_pytorch_smoke
data:
  root: data/processed
  metadata_dir: data/processed/metadata
  train_dir: train
  val_dir: validation
  test_dir: test
  class_names: classes-fixed.json
  val_ratio: 0.2
  pin_memory: false
model:
  input_length: 1024
  input_channels: 2
  num_classes: 24
  use_se: true
  use_dilation: true
training:
  epochs: 1
  batch_size: 16
  lr: 0.0001
  weight_decay: 0.0
  seed: 42
  num_workers: 0
  scheduler_patience: 2
  scheduler_factor: 0.1
  min_lr: 0.0000001
runtime:
  device: cpu
  run_root: runs
